services:
  postgres:
    image: postgres:16-alpine
    container_name: graphify-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: graphify
      POSTGRES_USER: graphify
      POSTGRES_PASSWORD: graphify
    volumes:
      - graphify_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphify -d graphify"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: graphify-pgadmin
    restart: unless-stopped
    ports:
      - "${GRAPHIFY_PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${GRAPHIFY_PGADMIN_EMAIL:-admin@graphify.dev}
      PGADMIN_DEFAULT_PASSWORD: ${GRAPHIFY_PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    volumes:
      - graphify_pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./docker/pgadmin/pgpass:/pgadmin4/pgpass:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  graphify_pg_data:
  graphify_pgadmin_data:
