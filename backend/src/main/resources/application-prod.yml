spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Cloud Run은 인스턴스가 다수로 스케일되므로 인스턴스당 풀은 작게 유지.
      # Supabase Transaction Pooler(6543) 사용 시 권장.
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: ${FLYWAY_DATASOURCE_URL:${SPRING_DATASOURCE_URL}}
    user: ${FLYWAY_DATASOURCE_USERNAME:${SPRING_DATASOURCE_USERNAME}}
    password: ${FLYWAY_DATASOURCE_PASSWORD:${SPRING_DATASOURCE_PASSWORD}}

graphify:
  cors:
    # 콤마 구분 문자열 → List<String> 자동 바인딩
    # 예: https://app.example.com,https://example.com
    allowed-origins: ${GRAPHIFY_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  secrets:
    encryption-key: ${GRAPHIFY_SECRETS_ENCRYPTION_KEY}
  dart:
    api-key: ${DART_API_KEY:}
    corp-code-cache-hours: ${DART_CORP_CODE_CACHE_HOURS:24}
    search-max-results: ${DART_SEARCH_MAX_RESULTS:20}
    enrich-threshold: ${DART_ENRICH_THRESHOLD:3}
  news:
    api-key: ${NEWS_API_KEY:}
    refresh-minutes: ${NEWS_REFRESH_MINUTES:15}
  market:
    provider: ${MARKET_PROVIDER:composite}
    yahoo-enabled: ${MARKET_YAHOO_ENABLED:true}
    yahoo-chart-base-url: ${MARKET_YAHOO_CHART_URL:https://query1.finance.yahoo.com}
    naver-enabled: ${MARKET_NAVER_ENABLED:true}
    naver-finance-base-url: ${MARKET_NAVER_URL:https://finance.naver.com}
    krx-api-key: ${KRX_API_KEY:${API_KEY:}}
    krx-api-base-url: ${KRX_API_BASE_URL:https://data-dbg.krx.co.kr/svc/apis/sto}
    cnn-fear-greed-enabled: ${MARKET_CNN_FEAR_GREED_ENABLED:true}
    cnn-fear-greed-base-url: ${MARKET_CNN_FEAR_GREED_URL:https://production.dataviz.cnn.io}
  openai:
    base-url: ${OPENAI_BASE_URL:}
    api-key: ${OPENAI_API_KEY:}
    api-version: ${OPENAI_API_VERSION:2024-12-01-preview}
    deployment: ${OPENAI_DEPLOYMENT:${OPENAI_MODEL:gpt-4o}}
    model: ${OPENAI_MODEL:gpt-4o}
    fallback-deployment: ${OPENAI_FALLBACK_DEPLOYMENT:gpt-4o}
    auth-mode: ${OPENAI_AUTH_MODE:api-key}
    max-tokens: ${OPENAI_MAX_TOKENS:4096}
    rss-feeds:
      - https://www.hankyung.com/feed/economy
      - https://www.mk.co.kr/rss/30000001/
      - https://www.yna.co.kr/rss/economy.xml
  auth:
    jwt-secret: ${GRAPHIFY_JWT_SECRET}
    access-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
    api-public-base-url: ${API_PUBLIC_BASE_URL:http://localhost:8081}

logging:
  level:
    com.graphify: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: ${LOG_LEVEL_WEB:WARN}
