spring:
  application:
    name: graphify-api
  profiles:
    active: dev

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

graphify:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
